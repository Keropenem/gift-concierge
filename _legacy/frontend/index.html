<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Concierge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="landing">
    <h1>Gift Concierge</h1>
    <p class="landing-subtitle">大切な人へ、最高の贈り物を。</p>

    <div class="landing-options">
      <a href="/chat" class="landing-card">
        <div class="landing-icon">💬</div>
        <div class="landing-card-title">チャットで相談する</div>
        <div class="landing-card-desc">コンシェルジュと会話しながら、ぴったりのギフトを一緒に見つけましょう。</div>
      </a>

      <a href="/form" class="landing-card">
        <div class="landing-icon">📝</div>
        <div class="landing-card-title">フォームで情報を入力する</div>
        <div class="landing-card-desc">相手やシチュエーションの情報をまとめて入力し、すぐに提案を受け取れます。</div>
      </a>
    </div>
  </div>
</body>
</html>
